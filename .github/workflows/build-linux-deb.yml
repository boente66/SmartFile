name: Linux Debian package

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils fakeroot libsane-dev dpkg-dev
      - name: Build and validate package
        run: ./scripts/build_linux_deb.sh
      - name: Upload temporary build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartfile-linux-amd64
          path: |
            release/*.deb
            release/*.sha256
            docs/RELEASE_NOTES_0.9.0-beta.1.md
          if-no-files-found: error

  draft-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: smartfile-linux-amd64
          path: artifacts
      - name: Create draft pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="$(find artifacts -name 'RELEASE_NOTES_*.md' -print -quit)"
          gh release create "${GITHUB_REF_NAME}" \
            --draft --prerelease \
            --title "SmartFile 0.9.0 Beta 1" \
            --notes-file "$NOTES" \
            artifacts/*.deb artifacts/*.sha256
